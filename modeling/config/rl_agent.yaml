random_state: 10

network:
  hidden_sizes: [256, 256, 128]
  output_size: 3
  dropout: 0.1

training:
  epochs: 3
  learning_rate: 0.00005
  weight_decay: 0.01
  gamma: 0.9
  target_update_freq: 500
  cql_weight: 0.1
  training_update: 1000

reward:
  base_reward: 0.4
  class_ratio: 2
  time_penalty: -0.001

data:
  test_size: 0.2
  batch_size: 16
  scaling_cols:
    - anchor_age
    - acuity
    - current_temperature
    - current_heartrate
    - current_resprate
    - current_o2sat
    - current_sbp
    - current_dbp
    - current_pain
    - current_pulse_pressure
    - current_map
    - height
    - weight
  action_col: action_taken
  stay_id_col: ed_stay_id
  event_col: event_idx
  p_icu_col: p_icu

artifacts:
  policy_dir: modeling/artifacts/rl_policy
